<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  :root {
    --bg: #080608;
    --surface: #100e12;
    --surface2: #181520;
    --border: #2a2535;
    --primary: #f5a623;
    --primary-dim: rgba(245, 166, 35, 0.12);
    --primary-glow: rgba(245, 166, 35, 0.22);
    --signal: #00e87a;
    --signal-dim: rgba(0, 232, 122, 0.12);
    --danger: #ff3b5c;
    --text: #f2ede8;
    --text2: #9088a0;
    --text3: #3d3550;
    --chrome: #1e1b28;
    --mono: "Courier New", monospace;
  }
  body.light {
    --bg: #f5f0e8;
    --surface: #fefcf8;
    --surface2: #ede8de;
    --border: #cfc8bc;
    --primary: #b87000;
    --primary-dim: rgba(184, 112, 0, 0.1);
    --primary-glow: rgba(184, 112, 0, 0.18);
    --signal: #1a7a40;
    --signal-dim: rgba(26, 122, 64, 0.1);
    --danger: #c62828;
    --text: #1a1520;
    --text2: #6b6070;
    --text3: #c0b8cc;
    --chrome: #d8d0c4;
  }
  #app {
    width: 375px;
    min-height: 780px;
    background: var(--bg);
    border-radius: 40px;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    font-family: -apple-system, sans-serif;
    border: 1px solid var(--border);
    transition:
      background 0.3s,
      border-color 0.3s;
  }
  #controls-outer {
    display: flex;
    justify-content: center;
    padding: 16px 0 8px;
  }
  #controls-outer .ctrl-row {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  #controls-outer button {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 6px;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-secondary);
    cursor: pointer;
    color: var(--color-text-primary);
  }

  /* ── Waveform canvas ── */
  #waveform-wrap {
    position: absolute;
    left: 0;
    width: 375px;
    pointer-events: none;
    opacity: 0.88;
    z-index: 1;
  }

  /* ── Top bar ── */
  #top-bar {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 52px 20px 8px;
  }
  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }
  #rds-center {
    flex: 1;
    text-align: center;
  }
  #rds-station {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--primary);
    display: block;
    transition: color 0.3s;
  }
  #rds-text {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text2);
    display: block;
    margin-top: 1px;
    transition: color 0.3s;
  }
  .top-right {
    display: flex;
  }

  /* ── Center display ── */
  #center {
    position: relative;
    z-index: 2;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 0 24px;
  }

  /* Band + pills row */
  .status-row {
    display: flex;
    width: 100%;
    align-items: center;
    justify-content: space-between;
  }
  .band-toggle {
    display: flex;
    background: var(--surface2);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
  }
  .band-btn {
    padding: 5px 16px;
    border-radius: 6px;
    border: 1px solid transparent;
    cursor: pointer;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 2px;
    background: none;
    color: var(--text3);
    transition: all 0.2s;
  }
  .band-btn.active {
    background: var(--primary-dim);
    border-color: var(--primary);
    color: var(--primary);
  }
  .pills {
    display: flex;
    gap: 6px;
  }
  .pill {
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 1.5px;
    transition: all 0.3s;
  }
  .pill-stereo {
    background: var(--signal-dim);
    border-color: var(--signal);
    color: var(--signal);
  }
  .pill-mono {
    background: var(--primary-dim);
    border-color: var(--primary);
    color: var(--primary);
  }
  .pill-rec {
    background: rgba(255, 59, 92, 0.12);
    border-color: var(--danger);
    color: var(--danger);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .rec-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--danger);
    animation: blink 1s infinite;
  }
  @keyframes blink {
    0%,
    100% {
      opacity: 1;
    }
    50% {
      opacity: 0.2;
    }
  }

  /* Frequency */
  #freq-wrap {
    cursor: pointer;
    text-align: center;
    position: relative;
  }
  #freq-display {
    display: flex;
    align-items: baseline;
    gap: 0;
    justify-content: center;
  }
  #freq-int {
    font-size: 76px;
    font-weight: 100;
    letter-spacing: -4px;
    color: var(--primary);
    line-height: 1;
    transition: color 0.3s;
    font-family: -apple-system, sans-serif;
  }
  #freq-dot {
    font-size: 56px;
    font-weight: 100;
    color: var(--primary);
    opacity: 0.7;
    line-height: 1;
  }
  #freq-dec {
    font-size: 54px;
    font-weight: 200;
    color: var(--primary);
    letter-spacing: -2px;
    line-height: 1;
    transition: color 0.3s;
  }
  #freq-unit {
    font-size: 18px;
    color: var(--text2);
    padding-left: 6px;
    padding-bottom: 8px;
    font-weight: 400;
  }
  #freq-hint {
    font-size: 9px;
    letter-spacing: 1.5px;
    color: var(--text3);
    margin-top: 4px;
    text-transform: uppercase;
  }
  #hw-freq-info {
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--text3);
    margin-top: 2px;
    font-family: var(--mono);
    min-height: 12px;
  }
  #freq-input-row {
    display: none;
    align-items: baseline;
    gap: 8px;
  }
  #freq-input {
    font-size: 56px;
    font-weight: 100;
    color: var(--primary);
    background: none;
    border: none;
    border-bottom: 2px solid var(--primary);
    outline: none;
    width: 100% - 30px;
    text-align: center;
    font-family: -apple-system, sans-serif;
  }
  .freq-scale {
    transform: scale(1);
    transition: transform 0.1s;
  }
  .freq-scale.pulse {
    transform: scale(1.03);
  }

  #snr-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .snr-label {
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 2px;
    color: var(--text3);
  }
  .snr-val {
    font-size: 11px;
    font-family: var(--mono);
    font-weight: 700;
    color: var(--signal);
  }

  .mode-toggle {
    display: flex;
    gap: 6px;
  }
  .mode-btn {
    padding: 4px 12px;
    border-radius: 6px;
    border: 1px solid transparent;
    cursor: pointer;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    background: none;
    color: var(--text3);
    transition: all 0.2s;
  }
  .mode-btn.active {
    background: var(--primary-dim);
    border-color: var(--primary);
    color: var(--primary);
  }

  /* ── Knob controls (2-row bottom overlay) ── */
  #knob-controls {
    position: absolute;
    bottom: 12px;
    left: 0;
    right: 0;
    z-index: 6;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .knob-ctrl-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .t-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 18px;
    color: var(--text2);
    width: 52px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    letter-spacing: 1px;
    transition: color 0.15s;
  }
  .t-btn:active {
    color: var(--primary);
  }
  #rec-btn-t {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s;
  }
  #rec-btn-t.recording {
    border-color: var(--danger);
  }
  #rec-dot-t {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--text3);
    transition: all 0.2s;
  }
  #rec-dot-t.recording {
    background: var(--danger);
    border-radius: 2px;
  }

  /* ── Tuner dock ── */
  #tuner-dock {
    position: relative;
    z-index: 2;
    background: var(--surface);
    border-top: 0.5px solid var(--border);
    transition: background 0.3s;
  }
  #adv-handle {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 0 4px;
    cursor: pointer;
    gap: 4px;
  }
  .handle-bar {
    width: 36px;
    height: 3px;
    border-radius: 2px;
    background: var(--border);
  }

  /* ── Ruler ── */
  #ruler {
    width: 375px;
    height: 52px;
    position: relative;
    overflow: hidden;
    border-top: 0.5px solid var(--border);
    cursor: grab;
  }
  #ruler:active {
    cursor: grabbing;
  }
  #ruler-canvas {
    position: absolute;
    top: 0;
    left: 0;
  }
  #needle {
    position: absolute;
    top: 0;
    left: 187px;
    width: 2px;
    pointer-events: none;
    z-index: 5;
  }
  .needle-bar {
    width: 2px;
    height: 117px;
    background: var(--primary);
  }

  .drag-hint-ruler {
    position: absolute;
    bottom: 4px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 9px;
    color: var(--text3);
    letter-spacing: 1px;
    pointer-events: none;
  }

  /* ── Knob stage ── */
  #knob-stage {
    position: relative;
    height: 300px;
    overflow: hidden;
    background: var(--surface);
    border-top: 0.5px solid var(--border);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  #knob {
    width: 820px;
    height: 820px;
    border-radius: 50%;
    background: radial-gradient(
      ellipse at 50% 38%,
      #252038 0%,
      #100e1a 45%,
      #07050a 80%
    );
    border: 1.5px solid var(--border);
    cursor: grab;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    top: -10px;
    z-index: 2;
    box-shadow: 0 -6px 48px rgba(0, 0, 0, 0.75);
    transition: border-color 0.2s;
  }
  #knob::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: repeating-conic-gradient(
      rgba(255, 255, 255, 0.005) 0deg 1.5deg,
      rgba(0, 0, 0, 0.18) 1.5deg 3deg
    );
    mask: radial-gradient(circle at center, transparent 330px, black 345px);
    -webkit-mask: radial-gradient(
      circle at center,
      transparent 330px,
      black 345px
    );
    pointer-events: none;
  }
  #knob-shine {
    position: absolute;
    width: 820px;
    height: 820px;
    border-radius: 50%;
    left: 50%;
    transform: translateX(-50%);
    top: -10px;
    pointer-events: none;
    z-index: 3;
    background: radial-gradient(
      ellipse 52% 44% at 38% 26%,
      rgba(255, 255, 255, 0.1) 0%,
      rgba(255, 255, 255, 0.04) 32%,
      transparent 62%
    );
  }
  #knob:active {
    cursor: grabbing;
  }
  #knob:hover {
    border-color: var(--primary);
  }
  .knob-marker {
    position: absolute;
    top: 14px;
    left: 50%;
    width: 4px;
    height: 38px;
    background: var(--primary);
    border-radius: 2px;
    box-shadow: 0 0 10px rgba(245, 166, 35, 0.9);
    pointer-events: none;
  }
  .knob-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.035);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .eq-btn {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    background: var(--chrome);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    width: 72px;
    transition: border-color 0.2s;
  }
  .eq-btn:hover {
    border-color: var(--primary);
  }
  .eq-btn-label {
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 2px;
    color: var(--text2);
  }
  .eq-mini {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 20px;
  }
  .eq-bar-mini {
    width: 5px;
    border-radius: 2px;
    background: rgba(245, 166, 35, 0.7);
  }
  .sig-meter {
    display: flex;
    gap: 2px;
    align-items: flex-end;
  }
  .sig-seg {
    width: 5px;
    height: 10px;
    border-radius: 1px;
  }
  #play-btn {
    width: 52px;
    height: 52px;
    border-radius: 26px;
    background: var(--primary);
    border: none;
    cursor: pointer;
    font-size: 20px;
    color: #080608;
    font-weight: 900;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 16px rgba(245, 166, 35, 0.4);
    transition:
      background 0.2s,
      box-shadow 0.2s;
  }
  #play-btn.playing {
    background: var(--danger);
    box-shadow: 0 0 16px rgba(255, 59, 92, 0.4);
    color: #fff;
  }
  .step-btns {
    display: flex;
    gap: 6px;
  }
  .step-btn {
    width: 30px;
    height: 30px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--chrome);
    cursor: pointer;
    font-size: 16px;
    font-weight: 700;
    color: var(--text2);
    display: flex;
    align-items: center;
    justify-content: center;
    transition:
      border-color 0.2s,
      color 0.2s;
  }
  .step-btn:hover {
    border-color: var(--primary);
    color: var(--primary);
  }

  /* ── Advanced panel ── */
  #adv-panel {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 420px;
    background: var(--surface2);
    border-top: 1px solid rgba(245, 166, 35, 0.3);
    border-radius: 20px 20px 0 0;
    transform: translateY(420px);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 10;
    overflow-y: auto;
  }
  #adv-panel.open {
    transform: translateY(0);
  }
  .adv-handle-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 0 4px;
    gap: 5px;
    cursor: pointer;
  }
  .adv-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2.5px;
    color: var(--text2);
  }
  .adv-content {
    padding: 16px 20px 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .adv-section {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .adv-section-label {
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 2.5px;
    color: var(--text3);
  }

  /* EQ sliders */
  .eq-sliders {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    justify-content: center;
  }
  .eq-scale-col {
    height: 140px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: flex-end;
    padding: 14px 0 28px;
  }
  .eq-scale-lbl {
    font-size: 8px;
    color: var(--text3);
    font-family: var(--mono);
    width: 26px;
    text-align: right;
  }
  .eq-slider-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .eq-db-label {
    font-size: 8px;
    font-family: var(--mono);
    height: 13px;
    text-align: center;
  }
  .eq-track {
    width: 12px;
    height: 100px;
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.07);
    position: relative;
    cursor: pointer;
  }
  .eq-zero {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 1px;
    background: var(--border);
  }
  .eq-fill {
    position: absolute;
    left: 1px;
    right: 1px;
    border-radius: 4px;
  }
  .eq-thumb {
    position: absolute;
    left: -4px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--primary);
    box-shadow: 0 0 8px rgba(245, 166, 35, 0.5);
    cursor: grab;
  }
  .eq-band-label {
    font-size: 8px;
    font-weight: 800;
    color: var(--primary);
    letter-spacing: 0.5px;
  }
  .eq-freq-label {
    font-size: 7px;
    color: var(--text3);
    font-family: var(--mono);
  }

  /* Gain */
  .gain-row {
    display: flex;
    justify-content: space-between;
  }
  .gain-label {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 1px;
    color: var(--text3);
  }
  .gain-val {
    font-size: 13px;
    font-family: var(--mono);
    font-weight: 700;
    color: var(--primary);
  }
  .gain-track {
    height: 8px;
    border-radius: 4px;
    background: rgba(255, 255, 255, 0.07);
    position: relative;
    margin: 4px 0;
    cursor: pointer;
  }
  .gain-fill {
    height: 100%;
    border-radius: 4px;
    background: rgba(245, 166, 35, 0.75);
    position: absolute;
    left: 0;
  }
  .gain-thumb {
    position: absolute;
    top: -6px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--primary);
    box-shadow: 0 0 8px rgba(245, 166, 35, 0.5);
    cursor: grab;
    transform: translateX(-50%);
  }
  .gain-range-row {
    display: flex;
    justify-content: space-between;
  }
  .gain-range-lbl {
    font-size: 9px;
    font-family: var(--mono);
    color: var(--text3);
  }

  /* Mode toggles */
  .toggle-row {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .mode-toggle-btn {
    padding: 9px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--chrome);
    cursor: pointer;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 2px;
    color: var(--text2);
    transition: all 0.2s;
  }
  .mode-toggle-btn.active {
    background: var(--primary-dim);
    border-color: var(--primary);
    color: var(--primary);
  }
</style>

<div id="controls-outer">
  <div class="ctrl-row">
    <button onclick="toggleTheme()">Toggle light/dark</button>
    <button onclick="toggleWaveMode()">
      Waveform: <span id="wave-mode-lbl">scope</span>
    </button>
  </div>
</div>

<div style="display: flex; justify-content: center; padding: 8px 0 24px">
  <div id="app">
    <canvas id="waveform-wrap" width="375" height="400"></canvas>

    <!-- Top bar -->
    <div id="top-bar">
      <div class="top-right">
        <button
          class="icon-btn"
          onclick="toggleSettings()"
          title="Settings"
          style="color: var(--text2); font-size: 18px"
        >
          ⚙
        </button>
        <button
          class="icon-btn"
          id="mute-btn"
          onclick="toggleMute()"
          title="Mute"
          style="font-size: 16px"
        >
          🔊
        </button>
        <button
          class="icon-btn"
          id="bm-btn"
          onclick="toggleBookmark()"
          title="Bookmark"
          style="color: var(--text2); font-size: 18px"
        >
          ☆
        </button>
      </div>
    </div>

    <!-- Center display -->
    <div id="center">
      <div class="">
        <div class="status-row">
          <div class="band-toggle">
            <button
              class="band-btn active"
              id="btn-fm"
              onclick="setDemodulation('fm')"
            >
              FM
            </button>
            <button
              class="band-btn"
              id="btn-am"
              onclick="setDemodulation('am')"
            >
              AM
            </button>
          </div>
        </div>
      </div>
      <div id="freq-wrap" onclick="handleFreqTap()">
        <div class="freq-scale" id="freq-scale">
          <div id="freq-display">
            <span id="freq-int">88</span><span id="freq-dot">.</span
            ><span id="freq-dec">500</span>
            <span id="freq-unit">MHz</span>
          </div>

              <div class="gain-fill" id="gain-fill" style="width: 57%"></div>
              <div class="gain-thumb" id="gain-thumb" style="left: 57%"></div>
            </div>
            <div class="gain-range-row">

<script>
  const STATIONS = [
    {
      hz: 88.5e6,
      ps: "KQED-FM",
      rt: "Forum with Michael Krasny",
      stereo: false,
    },
    {
      hz: 91.1e6,
      ps: "KCSM    ",
      rt: "Jazz 91 — Miles Davis: So What",
      stereo: true,
    },
    {
      hz: 94.9e6,
      ps: "KYLD    ",
      rt: "Wild 94.9 — SF's #1 Hit Music",
      stereo: true,
    },
    {
      hz: 97.3e6,
      ps: "KLLC    ",
      rt: "Alice 97.3 — More Variety",
      stereo: true,
    },
    {
      hz: 100.3e6,
      ps: "KBRG    ",
      rt: "Bridge 100.3 — Classic Hits",
      stereo: false,
    },
    {
      hz: 104.5e6,
      ps: "KFOG    ",
      rt: "KFOG 104.5 — Album Rock",
      stereo: true,
    },
  ];
  const EQ_BANDS = [
    { label: "SUB", freq: "60Hz" },
    { label: "BASS", freq: "250Hz" },
    { label: "MUD", freq: "500Hz" },
    { label: "MID", freq: "1kHz" },
    { label: "EDGE", freq: "2kHz" },
    { label: "PRES", freq: "10kHz" },
    { label: "AIR", freq: "16kHz" },
  ];
  const RTL_GAINS = [
    0, 9, 14, 27, 37, 77, 87, 125, 144, 157, 166, 197, 207, 229, 254, 280, 297,
    328, 338, 364, 372, 386, 402, 421, 434, 439, 445, 480, 496,
  ];

  const MODE_DEFAULTS = {
    fm: {
      filterBwUpperHz: 100000,
      filterBwLowerHz: 100000,
      filterBwMinHz: 50000,
      filterBwMaxHz: 400000,
    },
    nfm: {
      filterBwUpperHz: 6250,
      filterBwLowerHz: 6250,
      filterBwMinHz: 50000,
      filterBwMaxHz: 400000,
    },
    am: {
      filterBwUpperHz: 3000,
      filterBwLowerHz: 3000,
      filterBwMinHz: 3000,
      filterBwMaxHz: 20000,
    },
    lsb: {
      filterBwUpperHz: 0,
      filterBwLowerHz: 2700,
      filterBwMinHz: 3000,
      filterBwMaxHz: 20000,
    },
    lsb: {
      filterBwUpperHz: 2700,
      filterBwLowerHz: 0,
      filterBwMinHz: 3000,
      filterBwMaxHz: 20000,
    },
  };

  let state = {
    hwHz: 88.5e6,
    centerHz: 88.5e6,
    band: "fm",
    filterBwUpperHz: 100e3,
    filterBwLowerHz: 100e3, // asymmetric filter filter; SSB sets one side to 0
    filterBwMinHz: 50e3,
    filterBwMaxHz: 400e3, // slider bounds (total BW)
    hwBandwidthMinHz: 0,
    hwBandwidthMaxHz: Infinity, // set by setHardwareCapability()
    sampleBandwidthHz: 2.4e6, // set by setHardwareCapability()
    playing: false,
    muted: false,
    bookmarked: false,
    stereo: false,
    recording: false,
    advOpen: false,
    eq: [0, 0, 0, 0, 0, 0, 0],
    gainIdx: 15,
    output: {
      mode: "mono",
    },
    outputMono: false,
    waveMode: "scope",
    strength: 0,
    snr: 0,
    knobAngle: 0,
    darkMode: true,
    wavePhase: 0,
    waveData: new Float32Array(375),
    waveZoom: 1,
  };

  // Called by the hardware layer once capabilities are known.
  function setHardwareCapability(minHz, maxHz, sampleBandwidthHz) {
    state.hwBandwidthMinHz = minHz;
    state.hwBandwidthMaxHz = maxHz;
    state.sampleBandwidthHz = sampleBandwidthHz;
  }

  function setCenterFreq(targetHz) {
    targetHz = Math.max(
      state.hwBandwidthMinHz,
      Math.min(state.hwBandwidthMaxHz, targetHz),
    );
    const sampleHalfBw = state.sampleBandwidthHz / 2;
    if (
      targetHz + state.filterBwUpperHz > state.hwHz + sampleHalfBw ||
      targetHz - state.filterBwLowerHz < state.hwHz - sampleHalfBw
    ) {
      state.hwHz = targetHz;
    }
    state.centerHz = targetHz;
  }

  function setFreq(hz) {
    hz = Math.max(state.hwBandwidthMinHz, Math.min(state.hwBandwidthMaxHz, hz));
    state.hwHz = hz;
    state.centerHz = hz;
  }

  function getVisibleRangeHz() {
    return (state.filterBwUpperHz + state.filterBwLowerHz) * 20;
  }

  function niceStep(x) {
    const exp = Math.floor(Math.log10(x));
    const base = Math.pow(10, exp);
    const f = x / base;
    return (f < 1.5 ? 1 : f < 3.5 ? 2 : f < 7.5 ? 5 : 10) * base;
  }

  function freqStr(hz) {
    let divisor, unit;
    if (hz >= 1e9) {
      divisor = 1e9;
      unit = "GHz";
    } else if (hz >= 1e6) {
      divisor = 1e6;
      unit = "MHz";
    } else {
      divisor = 1e3;
      unit = "kHz";
    }
    const [int, dec] = (hz / divisor).toFixed(3).split(".");
    return { int, dec, unit, divisor };
  }

  function findStation(hz) {
    return STATIONS.find((s) => Math.abs(s.hz - hz) < 0.15e6) || null;
  }

  function updateDisplay() {
    const {
      centerHz,
      hwHz,
      band,
      playing,
      stereo,
      recording,
      outputMono,
      bookmarked,
      muted,
    } = state;

    const { int, dec, unit } = freqStr(centerHz);
    document.getElementById("freq-int").textContent = int;
    document.getElementById("freq-dot").style.display = "";
    document.getElementById("freq-dec").textContent = dec;
    document.getElementById("freq-unit").textContent = unit;

    const offsetHz = centerHz - hwHz;
    const hwInfo = document.getElementById("hw-freq-info");
    const sign = offsetHz > 0 ? "+" : "−";
    const absKhz = Math.abs(offsetHz / 1e3).toFixed(1);
    const hw = freqStr(hwHz);
    hwInfo.textContent = `HW: ${hw.int}.${hw.dec} ${hw.unit}  (${sign}${absKhz} kHz)`;

    document.getElementById("pill-stereo").style.display =
      playing && stereo && !outputMono ? "" : "none";
    document.getElementById("pill-mono").style.display =
      playing && (!stereo || outputMono) ? "" : "none";
    document.getElementById("pill-rec").style.display = recording ? "" : "none";
    document.getElementById("snr-row").style.display = playing ? "" : "none";

    const pb = document.getElementById("play-btn");
    pb.textContent = playing ? "■" : "▶";
    pb.classList.toggle("playing", playing);

    document.getElementById("bm-btn").textContent = bookmarked ? "★" : "☆";
    document.getElementById("bm-btn").style.color = bookmarked
      ? "var(--primary)"
      : "var(--text2)";
    document.getElementById("mute-btn").textContent = muted ? "🔇" : "🔊";
    document.getElementById("mute-btn").style.color = muted
      ? "var(--danger)"
      : "var(--text2)";

    const station = playing ? findStation(centerHz) : null;
    document.getElementById("rds-station").textContent = station
      ? station.ps
      : playing
        ? "─── scanning ───"
        : "SDRGo";
    document.getElementById("rds-text").textContent = station?.rt || "";

    document.getElementById("snr-val").textContent =
      state.snr.toFixed(1) + " dB";

    drawSignalMeter();
    drawRuler();
    updateGainDisplay();
    updateBandwidthDisplay();
  }

  function drawSignalMeter() {
    const meter = document.getElementById("sig-meter");
    meter.innerHTML = "";
    const segs = 10;
    const filled = Math.round(state.strength * segs);
    for (let i = 0; i < segs; i++) {
      const d = document.createElement("div");
      d.className = "sig-seg";
      const ratio = i / segs;
      const color =
        ratio < 0.6
          ? "var(--signal)"
          : ratio < 0.85
            ? "var(--primary)"
            : "var(--danger)";
      d.style.background = i < filled ? color : "rgba(255,255,255,0.07)";
      meter.appendChild(d);
    }
  }

  function drawRuler() {
    const c = document.getElementById("ruler-canvas");
    const ctx = c.getContext("2d");
    ctx.clearRect(0, 0, 375, 52);
    const isDark = state.darkMode;
    const W = 375;

    const visibleRangeHz = getVisibleRangeHz();
    const pxPerHz = W / visibleRangeHz;
    const tickStepHz = niceStep(visibleRangeHz / 8);
    const majorStepHz = niceStep(visibleRangeHz / 4);

    // Label format — decimal places needed to distinguish major ticks
    const { divisor: labelDiv } = freqStr(state.centerHz);
    const stepInLabelUnit = majorStepHz / labelDiv;
    const labelDp =
      stepInLabelUnit >= 1
        ? 0
        : stepInLabelUnit >= 0.1
          ? 1
          : stepInLabelUnit >= 0.01
            ? 2
            : 3;

    // Sample bandwidth window
    const sampleHalfBw = state.sampleBandwidthHz / 2;
    const sampleLeft =
      W / 2 + (state.hwHz - sampleHalfBw - state.centerHz) * pxPerHz;
    const sampleRight =
      W / 2 + (state.hwHz + sampleHalfBw - state.centerHz) * pxPerHz;
    ctx.fillStyle = isDark ? "rgba(245,166,35,0.06)" : "rgba(184,112,0,0.06)";
    ctx.fillRect(
      Math.max(0, sampleLeft),
      0,
      Math.min(W, sampleRight) - Math.max(0, sampleLeft),
      52,
    );

    ctx.strokeStyle = isDark ? "rgba(245,166,35,0.25)" : "rgba(184,112,0,0.25)";
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    [sampleLeft, sampleRight].forEach((x) => {
      if (x >= 0 && x <= W) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, 52);
        ctx.stroke();
      }
    });
    ctx.setLineDash([]);

    // Filter bandwidth — asymmetric
    const filterLowerPx = state.filterBwLowerHz * pxPerHz;
    const filterUpperPx = state.filterBwUpperHz * pxPerHz;
    ctx.fillStyle = isDark ? "rgba(0,232,122,0.08)" : "rgba(26,122,64,0.08)";
    ctx.fillRect(W / 2 - filterLowerPx, 0, filterLowerPx + filterUpperPx, 52);

    // Ticks — anchored to absolute Hz multiples
    const half = visibleRangeHz / 2;
    const firstTick =
      Math.ceil((state.centerHz - half) / tickStepHz) * tickStepHz;
    const lastTick =
      Math.floor((state.centerHz + half) / tickStepHz) * tickStepHz;
    for (let tickHz = firstTick; tickHz <= lastTick; tickHz += tickStepHz) {
      const x = W / 2 + (tickHz - state.centerHz) * pxPerHz;
      if (x < -2 || x > W + 2) continue;
      const isMajor = tickHz % majorStepHz === 0;
      const h = isMajor ? 18 : 8;
      ctx.strokeStyle = isMajor
        ? isDark
          ? "rgba(245,166,35,0.8)"
          : "rgba(184,112,0,0.8)"
        : isDark
          ? "rgba(61,53,80,0.9)"
          : "rgba(192,184,204,0.9)";
      ctx.lineWidth = isMajor ? 2 : 1;
      ctx.beginPath();
      ctx.moveTo(x, 4);
      ctx.lineTo(x, 4 + h);
      ctx.stroke();
      if (isMajor) {
        ctx.font = "10px monospace";
        ctx.fillStyle = isDark ? "rgba(245,166,35,0.6)" : "rgba(184,112,0,0.6)";
        ctx.textAlign = "center";
        ctx.fillText((tickHz / labelDiv).toFixed(labelDp), x, 42);
      }
    }
  }

  function buildEqSliders() {
    const container = document.getElementById("eq-sliders");
    container.innerHTML = "";
    const scaleCol = document.createElement("div");
    scaleCol.className = "eq-scale-col";
    ["+12", "+6", "0", "−6", "−12"].forEach((l) => {
      const s = document.createElement("div");
      s.className = "eq-scale-lbl";
      s.textContent = l;
      scaleCol.appendChild(s);
    });
    container.appendChild(scaleCol);

    EQ_BANDS.forEach((band, idx) => {
      const col = document.createElement("div");
      col.className = "eq-slider-col";
      const val = state.eq[idx];
      const isBoost = val > 0;
      const isZero = val == 0;
      const fillRatio = (val + 12) / 24;
      const thumbPct = (1 - fillRatio) * 100;

      const dbLbl = document.createElement("div");
      dbLbl.className = "eq-db-label";
      dbLbl.style.color = isBoost ? "var(--signal)" : "var(--danger)";
      dbLbl.textContent = (val > 0 ? "+" : "") + val.toFixed(1);
      col.appendChild(dbLbl);

      const track = document.createElement("div");
      track.className = "eq-track";
      const zero = document.createElement("div");
      zero.className = "eq-zero";
      track.appendChild(zero);

      const fill = document.createElement("div");
      fill.className = "eq-fill";
      if (isBoost) {
        fill.style.bottom = "50%";
        fill.style.height = (fillRatio - 0.5) * 100 + "px";
        fill.style.background = "rgba(0,232,122,0.5)";
      } else if (isZero) {
        dbLbl.style.color = "var(--signal)";
      } else {
        fill.style.top = "50%";
        fill.style.height = (0.5 - fillRatio) * 100 + "px";
        fill.style.background = "rgba(255,59,92,0.5)";
      }
      track.appendChild(fill);

      const thumb = document.createElement("div");
      thumb.className = "eq-thumb";
      thumb.style.top = `calc(${thumbPct}% - 10px)`;
      track.appendChild(thumb);

      let dragging = false;
      track.addEventListener("mousedown", (e) => {
        dragging = true;
        const updateVal = (ev) => {
          const rect = track.getBoundingClientRect();
          const ratio = Math.max(
            0,
            Math.min(1, (ev.clientY - rect.top) / rect.height),
          );
          state.eq[idx] = Math.round(((1 - ratio) * 24 - 12) * 2) / 2;
          buildEqSliders();
        };
        updateVal(e);
        const move = (ev) => {
          if (dragging) updateVal(ev);
        };
        const up = () => {
          dragging = false;
          window.removeEventListener("mousemove", move);
          window.removeEventListener("mouseup", up);
        };
        window.addEventListener("mousemove", move);
        window.addEventListener("mouseup", up);
      });

      col.appendChild(track);
      const bl = document.createElement("div");
      bl.className = "eq-band-label";
      bl.textContent = band.label;
      col.appendChild(bl);
      const fl = document.createElement("div");
      fl.className = "eq-freq-label";
      fl.textContent = band.freq;
      col.appendChild(fl);
      container.appendChild(col);
    });
  }

  function updateGainDisplay() {
    const gain = RTL_GAINS[state.gainIdx];
    const ratio =
      (gain - RTL_GAINS[0]) / (RTL_GAINS[RTL_GAINS.length - 1] - RTL_GAINS[0]);
    document.getElementById("gain-val").textContent =
      (gain / 10).toFixed(1) + " dB";
    document.getElementById("gain-fill").style.width = ratio * 100 + "%";
    document.getElementById("gain-thumb").style.left = ratio * 100 + "%";
  }

  // ── Waveform animation ────────────────────────────────────────────────────────
  const wfCanvas = document.getElementById("waveform-wrap");
  const wfCtx = wfCanvas.getContext("2d");
  let waveMode = "scope";
  let animId;

  function drawWaveform() {
    const W = wfCanvas.width,
      H = wfCanvas.height;
    wfCtx.clearRect(0, 0, W, H);
    const isDark = state.darkMode;
    const z = state.waveZoom;
    state.wavePhase += 0.04;

    if (!state.playing) {
      wfCtx.strokeStyle = isDark
        ? "rgba(0,232,122,0.15)"
        : "rgba(26,122,64,0.15)";
      wfCtx.lineWidth = 1.5;
      wfCtx.beginPath();
      wfCtx.moveTo(0, H / 2);
      wfCtx.lineTo(W, H / 2);
      wfCtx.stroke();
      animId = requestAnimationFrame(drawWaveform);
      return;
    }

    const mid = H / 2;

    if (waveMode === "scope") {
      const visibleRangeHz = getVisibleRangeHz();
      const pxPerHz = W / visibleRangeHz;
      const sampleHalfBw = state.sampleBandwidthHz / 2;
      const filterTotal = state.filterBwUpperHz + state.filterBwLowerHz;
      const sigma = filterTotal / 2.5;

      // Sample bandwidth fill
      const sLeft =
        W / 2 + (state.hwHz - sampleHalfBw - state.centerHz) * pxPerHz;
      const sRight =
        W / 2 + (state.hwHz + sampleHalfBw - state.centerHz) * pxPerHz;
      wfCtx.fillStyle = isDark
        ? "rgba(245,166,35,0.04)"
        : "rgba(184,112,0,0.04)";
      wfCtx.fillRect(
        Math.max(0, sLeft),
        0,
        Math.min(W, sRight) - Math.max(0, sLeft),
        H,
      );

      // Filter bandwidth fill
      const fLeft = W / 2 - state.filterBwLowerHz * pxPerHz;
      const fRight = W / 2 + state.filterBwUpperHz * pxPerHz;
      wfCtx.fillStyle = isDark
        ? "rgba(0,232,122,0.05)"
        : "rgba(26,122,64,0.05)";
      wfCtx.fillRect(
        Math.max(0, fLeft),
        0,
        Math.min(W, fRight) - Math.max(0, fLeft),
        H,
      );

      // Simulated spectrum — noise floor + Gaussian station peaks
      const spec = new Float32Array(W);
      for (let x = 0; x < W; x++) {
        const freqAtX = state.centerHz + (x - W / 2) / pxPerHz;
        let power =
          0.04 +
          Math.sin(x * 0.5 + state.wavePhase * 2.1) * 0.007 +
          Math.sin(x * 0.13 + state.wavePhase * 1.3) * 0.004 +
          (Math.random() - 0.5) * 0.008;
        if (Math.abs(freqAtX - state.hwHz) > sampleHalfBw) power *= 0.12;
        if (state.playing) {
          for (const s of STATIONS) {
            const d = (freqAtX - s.hz) / sigma;
            power = Math.max(
              power,
              Math.exp(-d * d * 2) *
                (0.78 + Math.sin(state.wavePhase * 0.4) * 0.06),
            );
          }
        }
        spec[x] = Math.min(1, Math.max(0, power));
      }

      // Filled area under spectrum
      wfCtx.beginPath();
      wfCtx.moveTo(0, H);
      for (let x = 0; x < W; x++) wfCtx.lineTo(x, H - spec[x] * H * 0.82);
      wfCtx.lineTo(W, H);
      wfCtx.closePath();
      wfCtx.fillStyle = isDark
        ? "rgba(0,232,122,0.06)"
        : "rgba(26,122,64,0.06)";
      wfCtx.fill();

      // Spectrum line — outer glow, bloom, core
      const drawSpecLine = (lw, alpha) => {
        wfCtx.beginPath();
        for (let x = 0; x < W; x++) {
          const y = H - spec[x] * H * 0.82;
          x === 0 ? wfCtx.moveTo(x, y) : wfCtx.lineTo(x, y);
        }
        wfCtx.strokeStyle = isDark
          ? `rgba(0,232,122,${alpha})`
          : `rgba(26,122,64,${alpha})`;
        wfCtx.lineWidth = lw;
        wfCtx.stroke();
      };
      drawSpecLine(8, 0.08);
      drawSpecLine(3, 0.22);
      drawSpecLine(1.5, 0.88);

      // Filter boundary lines — vertical dashed, aligns with ruler
      wfCtx.strokeStyle = isDark
        ? "rgba(0,232,122,0.35)"
        : "rgba(26,122,64,0.35)";
      wfCtx.lineWidth = 1;
      wfCtx.setLineDash([4, 4]);
      [fLeft, fRight].forEach((x) => {
        if (x >= 0 && x <= W) {
          wfCtx.beginPath();
          wfCtx.moveTo(x, 0);
          wfCtx.lineTo(x, H);
          wfCtx.stroke();
        }
      });
      wfCtx.setLineDash([]);
    } else {
      // Ambient mode — envelope
      const env = [];
      for (let i = 0; i < W; i++) {
        const t = i / W;
        const amp =
          0.45 +
          0.35 *
            Math.abs(Math.sin((t * Math.PI * 3) / z + state.wavePhase * 0.4)) +
          0.1 * Math.abs(Math.sin((t * Math.PI * 8) / z + state.wavePhase));
        env.push(amp);
      }
      wfCtx.fillStyle = isDark
        ? "rgba(245,166,35,0.08)"
        : "rgba(184,112,0,0.08)";
      wfCtx.beginPath();
      wfCtx.moveTo(0, mid);
      for (let i = 0; i < W; i++) wfCtx.lineTo(i, mid - env[i] * mid * 0.85);
      wfCtx.lineTo(W, mid);
      wfCtx.fill();
      wfCtx.beginPath();
      wfCtx.moveTo(0, mid);
      for (let i = 0; i < W; i++) wfCtx.lineTo(i, mid + env[i] * mid * 0.85);
      wfCtx.lineTo(W, mid);
      wfCtx.fill();
      // Center line
      wfCtx.strokeStyle = isDark
        ? "rgba(245,166,35,0.2)"
        : "rgba(184,112,0,0.2)";
      wfCtx.lineWidth = 1;
      wfCtx.beginPath();
      wfCtx.moveTo(0, mid);
      wfCtx.lineTo(W, mid);
      wfCtx.stroke();
    }

    animId = requestAnimationFrame(drawWaveform);
  }

  // ── Signal simulation ─────────────────────────────────────────────────────────
  setInterval(() => {
    if (!state.playing) {
      state.strength = 0;
      state.snr = 0;
      return;
    }
    const station = findStation(state.centerHz);
    const onStation = !!station;
    const base = onStation ? 0.72 : 0.08;
    state.strength = Math.max(
      0,
      Math.min(1, base + (Math.random() - 0.5) * 0.06),
    );
    state.snr = onStation
      ? 28 + (Math.random() - 0.5) * 4
      : 4 + Math.random() * 4;
    state.stereo = onStation && !!station.stereo;
    updateDisplay();
  }, 400);

  // ── Interactions ──────────────────────────────────────────────────────────────
  function togglePlay() {
    state.playing = !state.playing;
    if (!state.playing) {
      state.strength = 0;
      state.snr = 0;
      state.stereo = false;
    }
    updateDisplay();
  }
  function toggleMute() {
    state.muted = !state.muted;
    updateDisplay();
  }
  function toggleBookmark() {
    state.bookmarked = !state.bookmarked;
    updateDisplay();
  }
  function setDemodulation(b) {
    state.band = b;
    const defaults = MODE_DEFAULTS[b];
    state.filterBwUpperHz = defaults.filterBwUpperHz;
    state.filterBwLowerHz = defaults.filterBwLowerHz;
    state.filterBwMinHz = defaults.filterBwMinHz;
    state.filterBwMaxHz = defaults.filterBwMaxHz;
    document.getElementById("btn-fm").classList.toggle("active", b === "fm");
    document.getElementById("btn-am").classList.toggle("active", b === "am");
    updateDisplay();
  }
  function stepFreq(dir) {
    setCenterFreq(state.centerHz + dir * 1e3);
    pulseFreq();
    updateDisplay();
  }
  function stepPreset(dir) {
    const stations = STATIONS.map((s) => s.hz).sort((a, b) => a - b);
    const cur = stations.findIndex(
      (h) => Math.abs(h - state.centerHz) < 0.15e6,
    );
    let next = cur < 0 ? 0 : (cur + dir + stations.length) % stations.length;
    setFreq(stations[next]);
    pulseFreq();
    updateDisplay();
  }
  function pulseFreq() {
    const el = document.getElementById("freq-scale");
    el.style.transform = "scale(1.04)";
    setTimeout(() => (el.style.transform = "scale(1)"), 120);
  }
  let freqInputDivisor = 1e6;
  function handleFreqTap() {
    document.getElementById("freq-display").style.display = "none";
    const row = document.getElementById("freq-input-row");
    row.style.display = "flex";
    const inp = document.getElementById("freq-input");
    inp.value = state.centerHz;
    inp.focus();
    document.getElementById("rds-center").style.display = "none";
  }
  function freqKeydown(e) {
    if (e.key === "Enter") freqSubmit();
    if (e.key === "Escape") freqCancel();
  }
  function freqSubmit() {
    const v = document.getElementById("freq-input").value;
    if (!isNaN(v)) setFreq(v);
    freqCancel();
  }
  function freqCancel() {
    document.getElementById("freq-display").style.display = "flex";
    document.getElementById("freq-input-row").style.display = "none";
    document.getElementById("rds-center").style.display = "";
    updateDisplay();
  }
  function setWaveMode(m) {
    waveMode = m;
    document
      .getElementById("mode-scope")
      .classList.toggle("active", m === "scope");
    document
      .getElementById("mode-waterfall")
      .classList.toggle("active", m === "waterfall");
    document.getElementById("wave-mode-lbl").textContent = m;
  }
  function toggleWaveMode() {
    setWaveMode(waveMode === "scope" ? "waterfall" : "scope");
  }
  function updateZoomDisplay() {
    const LEVELS = [0.25, 0.5, 0.75, 1, 1.5, 2, 3, 4];
    const idx = LEVELS.findIndex((l) => Math.abs(l - state.waveZoom) < 0.01);
    const pct = ((idx < 0 ? 3 : idx) / (LEVELS.length - 1)) * 100;
    document.getElementById("zoom-fill").style.width = pct + "%";
    document.getElementById("zoom-thumb").style.left = pct + "%";
    document.getElementById("zoom-val").textContent = state.waveZoom + "×";
  }
  function setOutputMode(m) {
    state.output.mode = m;
    document
      .getElementById("btn-stereo")
      .classList.toggle("active", m === "stereo");
    document
      .getElementById("btn-mono-adv")
      .classList.toggle("active", m === "mono");
    updateDisplay();
  }
  function resetEq() {
    state.eq = [0, 0, 0, 0, 0, 0, 0];
    buildEqSliders();
  }
  function toggleAdvanced() {
    state.advOpen = !state.advOpen;
    document
      .getElementById("adv-panel")
      .classList.toggle("open", state.advOpen);
  }
  function toggleRec() {
    state.recording = !state.recording;
    const dot = document.getElementById("rec-dot-t");
    const btn = document.getElementById("rec-btn-t");
    const largeText = document.getElementById("rec-large-text");
    dot.classList.toggle("recording", state.recording);
    btn.classList.toggle("recording", state.recording);
    updateDisplay();
  }
  function toggleSettings() {
    alert("Settings panel — in the full app this opens a page sheet modal.");
  }

  // ── Ruler drag ────────────────────────────────────────────────────────────────
  let rulerDragging = false,
    rulerStartX = 0,
    rulerStartCenterHz = 0;
  document.getElementById("ruler").addEventListener("mousedown", (e) => {
    rulerDragging = true;
    rulerStartX = e.clientX;
    rulerStartCenterHz = state.centerHz;
  });
  window.addEventListener("mousemove", (e) => {
    if (!rulerDragging) return;
    const dx = e.clientX - rulerStartX;
    const pxPerHz = 375 / getVisibleRangeHz();
    const deltaHz = Math.round(-dx / pxPerHz / 1e3) * 1e3;
    setCenterFreq(rulerStartCenterHz + deltaHz);
    updateDisplay();
  });
  window.addEventListener("mouseup", () => {
    rulerDragging = false;
  });

  // ── Knob drag ─────────────────────────────────────────────────────────────────
  let knobDragging = false,
    knobLastAngle = null;
  const knobEl = document.getElementById("knob");

  function knobAngleFromEvent(clientX, clientY) {
    const rect = knobEl.getBoundingClientRect();
    const cx = rect.left + rect.width / 2,
      cy = rect.top + rect.height / 2;
    return (Math.atan2(clientY - cy, clientX - cx) * 180) / Math.PI;
  }
  function applyKnobDelta(delta) {
    if (Math.abs(delta) < 0.4) return;
    const steps = Math.round(delta);
    if (steps === 0) return;
    setCenterFreq(state.centerHz + steps * 1e3);
    state.knobAngle += delta;
    knobEl.style.transform = `translateX(-50%) rotate(${state.knobAngle}deg)`;
    updateDisplay();
  }

  knobEl.addEventListener("mousedown", (e) => {
    knobDragging = true;
    knobLastAngle = null;
    e.preventDefault();
  });
  window.addEventListener("mousemove", (e) => {
    if (!knobDragging) return;
    const angle = knobAngleFromEvent(e.clientX, e.clientY);
    if (knobLastAngle !== null) {
      let delta = angle - knobLastAngle;
      if (delta > 180) delta -= 360;
      if (delta < -180) delta += 360;
      applyKnobDelta(delta);
    }
    knobLastAngle = angle;
  });
  window.addEventListener("mouseup", () => {
    knobDragging = false;
  });

  knobEl.addEventListener(
    "touchstart",
    (e) => {
      knobDragging = true;
      knobLastAngle = null;
      e.preventDefault();
    },
    { passive: false },
  );
  window.addEventListener(
    "touchmove",
    (e) => {
      if (!knobDragging) return;
      const t = e.touches[0];
      const angle = knobAngleFromEvent(t.clientX, t.clientY);
      if (knobLastAngle !== null) {
        let delta = angle - knobLastAngle;
        if (delta > 180) delta -= 360;
        if (delta < -180) delta += 360;
        applyKnobDelta(delta);
      }
      knobLastAngle = angle;
    },
    { passive: false },
  );
  window.addEventListener("touchend", () => {
    knobDragging = false;
  });

  // ── Gain drag ─────────────────────────────────────────────────────────────────
  let gainDragging = false,
    gainStartX = 0,
    gainStartIdx = 0;
  document.getElementById("gain-track").addEventListener("mousedown", (e) => {
    gainDragging = true;
    gainStartX = e.clientX;
    gainStartIdx = state.gainIdx;
    e.preventDefault();
  });
  window.addEventListener("mousemove", (e) => {
    if (!gainDragging) return;
    const dx = e.clientX - gainStartX;
    const newIdx = Math.max(
      0,
      Math.min(RTL_GAINS.length - 1, Math.round(gainStartIdx + dx / 5)),
    );
    state.gainIdx = newIdx;
    updateGainDisplay();
  });
  window.addEventListener("mouseup", () => {
    gainDragging = false;
  });

  // ── Zoom drag ─────────────────────────────────────────────────────────────────
  const ZOOM_LEVELS = [0.25, 0.5, 0.75, 1, 1.5, 2, 3, 4];
  let zoomDragging = false,
    zoomStartX = 0,
    zoomStartIdx = 3;
  window.addEventListener("mousemove", (e) => {
    if (!zoomDragging) return;
    const dx = e.clientX - zoomStartX;
    const newIdx = Math.max(
      0,
      Math.min(ZOOM_LEVELS.length - 1, Math.round(zoomStartIdx + dx / 14)),
    );
    state.waveZoom = ZOOM_LEVELS[newIdx];
    updateZoomDisplay();
  });
  window.addEventListener("mouseup", () => {
    zoomDragging = false;
  });

  // ── Bandwidth control ─────────────────────────────────────────────────────────
  function bwLabel(hz) {
    const { int, dec, unit } = freqStr(hz);
    return `${int}.${dec} ${unit}`;
  }

  function updateBandwidthDisplay() {
    const { filterBwUpperHz, filterBwLowerHz, filterBwMinHz, filterBwMaxHz } =
      state;
    const total = filterBwUpperHz + filterBwLowerHz;
    const totalMin = filterBwMinHz * 2;
    const totalMax = filterBwMaxHz * 2;
    const ratio = (total - totalMin) / (totalMax - totalMin);
    const pct = (Math.max(0, Math.min(1, ratio)) * 100).toFixed(1) + "%";
    document.getElementById("bw-fill").style.width = pct;
    document.getElementById("bw-thumb").style.left = pct;
    document.getElementById("bw-val").textContent = bwLabel(total);
    document.getElementById("bw-min-lbl").textContent = bwLabel(totalMin);
    document.getElementById("bw-max-lbl").textContent = bwLabel(totalMax);
  }

  let bwDragging = false,
    bwStartX = 0,
    bwStartTotal = 0;
  document.getElementById("bw-track").addEventListener("mousedown", (e) => {
    bwDragging = true;
    bwStartX = e.clientX;
    bwStartTotal = state.filterBwUpperHz + state.filterBwLowerHz;
    e.preventDefault();
  });
  window.addEventListener("mousemove", (e) => {
    if (!bwDragging) return;
    const { filterBwMinHz, filterBwMaxHz } = state;
    const totalMin = filterBwMinHz * 2;
    const totalMax = filterBwMaxHz * 2;
    const dx = e.clientX - bwStartX;
    const trackEl = document.getElementById("bw-track");
    const newTotal =
      bwStartTotal + (dx / trackEl.offsetWidth) * (totalMax - totalMin);
    const half =
      Math.round(Math.max(totalMin, Math.min(totalMax, newTotal)) / 2 / 1e3) *
      1e3;
    state.filterBwUpperHz = half;
    state.filterBwLowerHz = half;
    updateBandwidthDisplay();
    drawRuler();
  });
  window.addEventListener("mouseup", () => {
    bwDragging = false;
  });

  // ── Waveform canvas position ───────────────────────────────────────────────────
  function positionWaveformCanvas() {
    const center = document.getElementById("center");
    const app = document.getElementById("app");
    const appRect = app.getBoundingClientRect();
    const centerRect = center.getBoundingClientRect();
    const top = Math.round(centerRect.top - appRect.top);
    const height = Math.round(centerRect.height);
    wfCanvas.style.top = top + "px";
    wfCanvas.height = height;
  }

  // ── Theme ─────────────────────────────────────────────────────────────────────
  function toggleTheme() {
    state.darkMode = !state.darkMode;
    document.querySelector("body").classList.toggle("light", !state.darkMode);
    document.getElementById("app").style.background = "var(--bg)";
    drawRuler();
  }

  // ── Init ──────────────────────────────────────────────────────────────────────
  buildEqSliders();
  updateDisplay();
  requestAnimationFrame(() => {
    positionWaveformCanvas();
    animId = requestAnimationFrame(drawWaveform);
  });
</script>
